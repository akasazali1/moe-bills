<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOE Bills - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* (same premium styles as provided earlier) */
        /* I'll include them in the full code block below to save space */
    </style>
</head>
<body>
    <!-- Animated particles -->
    <div class="bg-particles">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon"><i class="bi bi-receipt-cutoff"></i></div>
                <h1>Welcome Back</h1>
                <p>Sign in to manage utility bills</p>
            </div>
            {% if error %}
            <div class="error-alert"><i class="bi bi-exclamation-circle-fill"></i> {{ error }}</div>
            {% endif %}
            <form method="POST">
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="Enter the shared password" required>
                        <i class="bi bi-lock input-icon"></i>
                    </div>
                </div>
                <button type="submit" class="login-btn"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</button>
            </form>
            <div class="login-footer">Ministry of Education — Utility Billing System</div>
        </div>
    </div>
</body>
</html>
