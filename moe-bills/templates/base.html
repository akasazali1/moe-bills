<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOE Utility Bill System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="{{ url_for('dashboard') }}">
                <i class="bi bi-receipt-cutoff"></i> MOE Bills
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard') }}"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('water') }}"><i class="bi bi-droplet"></i> Water</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('electricity') }}"><i class="bi bi-lightning"></i> Electricity</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('telephone') }}"><i class="bi bi-telephone"></i> Telephone</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('sut') }}"><i class="bi bi-building"></i> SUT Office</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('reports') }}"><i class="bi bi-file-earmark-text"></i> Reports</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('print_select') }}"><i class="bi bi-printer"></i> Print</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('backup') }}"><i class="bi bi-cloud-download"></i> Backup</a></li>
                </ul>
                <span class="navbar-text text-white me-3"><i class="bi bi-person-circle"></i> {{ user }}</span>
                <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i> Logout</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
