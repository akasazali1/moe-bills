{% extends "base.html" %}
{% block content %}
<h2><i class="bi bi-printer"></i> Print Utility Bills</h2>
<p class="text-muted">Select filters to generate a print‑ready list (10 rows per page).</p>
<hr>

<form method="POST" action="{{ url_for('print_select') }}" class="row g-3 mb-4" target="_blank">
    <div class="col-md-3">
        <label class="form-label">Utility</label>
        <select name="utility" class="form-control" required>
            <option value="water">Water</option>
            <option value="electricity">Electricity</option>
            <option value="telephone">Telephone</option>
        </select>
    </div>
    <div class="col-md-3">
        <label class="form-label">Year</label>
        <input type="number" name="year" class="form-control" value="{{ year or 2025 }}" required>
    </div>
    <div class="col-md-3">
        <label class="form-label">Month (optional)</label>
        <input type="number" name="month" min="1" max="12" class="form-control" placeholder="All months">
    </div>
    <div class="col-md-3">
        <label class="form-label">Department</label>
        <select name="department_id" class="form-control">
            <option value="">All Departments</option>
            {% for dept in departments %}
                <option value="{{ dept.id }}">{{ dept.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-primary"><i class="bi bi-printer"></i> Print List</button>
    </div>
</form>

<hr>
<h5>Quick print a single record</h5>
<p>You can also click the printer icon on any record in the Water / Electricity / Telephone tabs.</p>
{% endblock %}
